<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A cute love confession page with Hello Kitty" />
  <title>Do You Love Me? 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #ffe0ec 0%, #ffc8dd 30%, #ffafcc 60%, #ff8fab 100%);
      overflow: hidden;
      position: relative;
    }

    /* ─── Raining Hearts ─── */
    .heart-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      top: -60px;
      font-size: 20px;
      animation: fall linear infinite;
      opacity: 0.7;
      user-select: none;
    }

    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
    }

    /* ─── Main Scene ─── */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ─── Kitty Image + Placard ─── */
    .kitty-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .kitty-wrapper img {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 8px 24px rgba(255, 105, 135, 0.4));
      animation: kittyBounce 2s ease-in-out infinite;
    }

    @keyframes kittyBounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    /* ─── Placard ─── */
    .placard {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 3px solid #ff6b8a;
      border-radius: 18px;
      padding: 14px 28px;
      box-shadow: 0 6px 28px rgba(255, 105, 135, 0.35);
      text-align: center;
      white-space: nowrap;
    }

    .placard h1 {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 1.8rem;
      color: #e0245e;
      text-shadow: 1px 1px 0 #ffb6c1;
      letter-spacing: 2px;
    }

    .placard .heart-icon {
      font-size: 1.5rem;
      animation: heartBeat 1s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25%      { transform: scale(1.2); }
      50%      { transform: scale(1); }
      75%      { transform: scale(1.15); }
    }

    /* ─── Buttons Container ─── */
    .buttons {
      display: flex;
      gap: 40px;
      margin-top: 20px;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 120px;
      width: 100vw;
    }

    /* ─── Shared Button Style ─── */
    .btn {
      font-family: 'Bubblegum Sans', cursive;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.18s ease, box-shadow 0.18s ease, font-size 0.25s ease, padding 0.25s ease;
    }

    .btn:active { transform: scale(0.96); }

    /* ─── YES Button ─── */
    #btn-yes {
      background: linear-gradient(135deg, #ff6b8a, #ff2d55);
      color: #fff;
      font-size: 1.3rem;
      padding: 16px 44px;
      z-index: 2;
    }

    #btn-yes:hover {
      box-shadow: 0 8px 32px rgba(255, 45, 85, 0.55);
      transform: scale(1.06);
    }

    /* ─── NO Button ─── */
    #btn-no {
      background: linear-gradient(135deg, #a0a0a0, #707070);
      color: #fff;
      font-size: 1.1rem;
      padding: 14px 38px;
      position: absolute;
      z-index: 2;
      transition: none; /* we move it via JS */
    }

    /* ─── Final Message ─── */
    .final-message {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe0ec 0%, #ffc8dd 40%, #ffafcc 100%);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .final-message.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .final-message h2 {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 3rem;
      color: #e0245e;
      text-shadow: 2px 2px 0 #ffb6c1;
      animation: pulseText 1.5s ease-in-out infinite;
      text-align: center;
      margin-bottom: 16px;
    }

    .final-message h3 {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 2.4rem;
      color: #ff2d55;
      animation: pulseText 1.8s ease-in-out infinite 0.3s;
      text-align: center;
    }

    .final-hearts {
      font-size: 3rem;
      margin: 24px 0;
      animation: heartBeat 1s ease-in-out infinite;
    }

    @keyframes pulseText {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    /* Burst hearts on final screen */
    .burst-heart {
      position: absolute;
      font-size: 2rem;
      animation: burstFly 3s ease-out infinite;
      pointer-events: none;
    }

    @keyframes burstFly {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-350px) scale(0.4) rotate(180deg); }
    }

    /* ─── Sparkles / Glitter ─── */
    .sparkle {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      pointer-events: none;
      animation: twinkle 2s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 1; transform: scale(1.4); }
    }
  </style>
</head>

      <div class="placard">
        <h1><span class="heart-icon">💖</span> DO YOU LOVE <span class="heart-icon">💖</span></h1>
      </div>
    </div>

    <div class="buttons" id="buttons-area">
      <button class="btn" id="btn-yes" onclick="handleYes()">YES 💕</button>
      <button class="btn" id="btn-no">NO 💔</button>
    </div>
  </div>

  <!-- Final Message -->
  <div class="final-message" id="final-message">
    <div class="final-hearts">💖💗💕💓💞💖</div>
    <h2>I knew you loved me! 🥰</h2>
    <h3>I LOVE YOU TOO 💕</h3>
    <div class="final-hearts">💖💗💕💓💞💖</div>
  </div>

  <script>
    // ─── Config ───
    const HEART_EMOJIS = ['❤️','💕','💗','💖','💓','💞','💘','🩷','♥️','😍'];
    const HEART_COUNT  = 40;
    const SPARKLE_COUNT = 20;

    let yesScale = 1;          // Current YES button scale factor
    let noAttempts = 0;        // How many times user hovered NO

    // ─── Create Raining Hearts ───
    const rainContainer = document.getElementById('heart-rain');
    for (let i = 0; i < HEART_COUNT; i++) {
      const h = document.createElement('span');
      h.classList.add('heart');
      h.textContent = HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (14 + Math.random() * 22) + 'px';
      h.style.animationDuration = (4 + Math.random() * 6) + 's';
      h.style.animationDelay = (Math.random() * 8) + 's';
      rainContainer.appendChild(h);
    }

    // ─── Create Sparkles ───
    const sparklesContainer = document.getElementById('sparkles');
    for (let i = 0; i < SPARKLE_COUNT; i++) {
      const s = document.createElement('div');
      s.classList.add('sparkle');
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = Math.random() * 100 + 'vh';
      s.style.animationDelay = (Math.random() * 3) + 's';
      s.style.width = s.style.height = (3 + Math.random() * 5) + 'px';
      sparklesContainer.appendChild(s);
    }

    // ─── NO button escape logic ───
    const btnNo = document.getElementById('btn-no');
    const btnYes = document.getElementById('btn-yes');

    function moveNoButton() {
      noAttempts++;

      // Grow YES button
      yesScale += 0.15;
      btnYes.style.fontSize = (1.3 * yesScale) + 'rem';
      btnYes.style.padding = `${16 * yesScale}px ${44 * yesScale}px`;

      // Move NO to a random position on screen (keep it visible)
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const margin = 80;
      const maxX = vw - margin * 2;
      const maxY = vh - margin * 2;
      const newX = margin + Math.random() * maxX;
      const newY = margin + Math.random() * maxY;

      btnNo.style.position = 'fixed';
      btnNo.style.left = newX + 'px';
      btnNo.style.top  = newY + 'px';

      // Shrink NO button a bit each time
      const noScale = Math.max(0.5, 1 - noAttempts * 0.06);
      btnNo.style.transform = `scale(${noScale})`;

      // Change NO text after a few tries
      if (noAttempts === 3)  btnNo.textContent = 'Are you sure? 🥺';
      if (noAttempts === 5)  btnNo.textContent = 'Really?? 😢';
      if (noAttempts === 7)  btnNo.textContent = 'Please say YES 🥹';
      if (noAttempts === 9)  btnNo.textContent = 'Pretty please? 💔';
      if (noAttempts >= 11)  btnNo.textContent = 'You can\'t catch me! 😜';
    }

    // Attach to both hover and touch
    btnNo.addEventListener('mouseenter', moveNoButton);
    btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); }, { passive: false });
    btnNo.addEventListener('click', (e) => { e.preventDefault(); moveNoButton(); });

    // ─── YES click handler ───
    function handleYes() {
      // Show final message
      const finalMsg = document.getElementById('final-message');
      finalMsg.classList.add('visible');

      // Create burst hearts on final screen
      for (let i = 0; i < 30; i++) {
        const bh = document.createElement('span');
        bh.classList.add('burst-heart');
        bh.textContent = HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)];
        bh.style.left = Math.random() * 100 + '%';
        bh.style.top = 60 + Math.random() * 40 + '%';
        bh.style.animationDelay = (Math.random() * 2) + 's';
        bh.style.animationDuration = (2 + Math.random() * 3) + 's';
        bh.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
        finalMsg.appendChild(bh);
      }

      // Add continuous floating hearts on final screen
      setInterval(() => {
        const fh = document.createElement('span');
        fh.classList.add('burst-heart');
        fh.textContent = HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)];
        fh.style.left = Math.random() * 100 + '%';
        fh.style.top = 90 + Math.random() * 15 + '%';
        fh.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
        fh.style.animationDuration = (3 + Math.random() * 3) + 's';
        finalMsg.appendChild(fh);
        // Clean up after animation
        setTimeout(() => fh.remove(), 6000);
      }, 300);
    }
  </script>
